name: Linux Build

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "bugfix/**"
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            libglfw3-dev \
            libasound2-dev \
            rpm

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DRTMIDI_API_ALSA=ON \
            -DRTMIDI_API_JACK=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Package DEB
        run: cd build && cpack -G DEB

      - name: Package RPM
        run: cd build && cpack -G RPM

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: i7ed-linux-deb-${{ github.sha }}
          path: build/*.deb

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: i7ed-linux-rpm-${{ github.sha }}
          path: build/*.rpm
