name: macOS Build

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "bugfix/**"
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: brew install cmake glfw

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Package
        run: cd build && cpack -G DragNDrop

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: i7ed-macos-dmg-${{ github.sha }}
          path: build/*.dmg
